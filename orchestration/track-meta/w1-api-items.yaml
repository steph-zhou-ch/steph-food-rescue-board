track_summary: |
  Implement the full REST API for surplus items: POST (create), GET
  (list with category filter), PATCH (claim/unclaim/confirm-pickup),
  and DELETE (soft-remove). Uses an in-memory data store — no database
  required. Includes the SurplusItem domain entity, status state machine,
  and all acceptance criteria from the API REQs.

